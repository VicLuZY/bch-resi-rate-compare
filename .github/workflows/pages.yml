name: Deploy GitHub Pages

on:
  push:
    branches: ["main", "website-redesign"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main
  NODE_OPTIONS: --no-deprecation

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build Vite app
        run: |
          short_sha="${GITHUB_SHA::7}"
          export VITE_DEPLOY_CODE="qivnaro-${GITHUB_RUN_NUMBER}-${short_sha}"
          echo "Deploy code: ${VITE_DEPLOY_CODE}"
          npm run build

      - name: Verify Vite code stack
        run: |
          test -f dist/index.html
          grep -q 'type="module"' dist/index.html
          if grep -R -n -E 'Hugo|data-wasm-url|wasm/' dist; then
            echo "Unexpected Hugo/WASM marker found in Pages artifact."
            exit 1
          fi
          grep -R -q 'qivnaro-' dist

      - name: Configure Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
